      let seleccionadas = []; // Preguntas seleccionadas con opciones mezcladas
      let respuestas = {}; // Respuestas del usuario (índice de opción seleccionada)
      let tiempoRestante = 900; // 5 minutos en segundos
      let examenTerminado = false;
      let intervaloTimer = null;

      /**
       * Función para mezclar un array (Fisher-Yates shuffle)
       */
      function mezclarArray(array) {
        const nuevoArray = [...array];
        for (let i = nuevoArray.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [nuevoArray[i], nuevoArray[j]] = [nuevoArray[j], nuevoArray[i]];
        }
        return nuevoArray;
      }

      /**
       * Mezcla las opciones de una pregunta y retorna:
       * - opcionesMezcladas: array con las opciones en orden aleatorio
       * - indiceCorrecto: nuevo índice donde se encuentra la respuesta correcta
       */
      function mezclarOpciones(preguntaOriginal) {
        const opcionesOriginales = [...preguntaOriginal.opciones];
        const respuestaCorrectaOriginal = preguntaOriginal.respuesta_correcta;

        // Crear array de objetos con cada opción y si es correcta o no
        const opcionesConFlag = opcionesOriginales.map((op) => ({
          texto: op,
          esCorrecta: op === respuestaCorrectaOriginal,
        }));

        // Mezclar las opciones
        const opcionesMezcladasObj = mezclarArray(opcionesConFlag);

        // Extraer solo los textos y encontrar el nuevo índice de la correcta
        const opcionesMezcladas = opcionesMezcladasObj.map((obj) => obj.texto);
        const indiceCorrecto = opcionesMezcladasObj.findIndex(
          (obj) => obj.esCorrecta,
        );

        return {
          opcionesMezcladas: opcionesMezcladas,
          indiceCorrecto: indiceCorrecto,
        };
      }

      /**
       * Selecciona 5 preguntas aleatorias y mezcla sus opciones
       */
      function seleccionarPreguntasAleatorias() {
        // Mezclar preguntas y tomar las primeras 5
        const preguntasMezcladas = mezclarArray(preguntasData.preguntas);
        const preguntasSeleccionadas = preguntasMezcladas.slice(0, 10);

        // Para cada pregunta seleccionada, mezclar sus opciones
        return preguntasSeleccionadas.map((pregunta) => {
          const { opcionesMezcladas, indiceCorrecto } =
            mezclarOpciones(pregunta);
          return {
            id: pregunta.id,
            pregunta: pregunta.pregunta,
            opciones: opcionesMezcladas,
            respuesta_correcta: indiceCorrecto, // Guardamos el índice correcto después de mezclar
          };
        });
      }

      function mostrarPreguntas() {
        const quiz = document.getElementById("quiz");
        quiz.innerHTML = ""; // Limpiar contenido previo

        seleccionadas.forEach((p, i) => {
          let opcionesHTML = p.opciones
            .map(
              (op, idx) =>
                `<label id="label_preg${i}_op${idx}">
             <input type="radio" id="preg${i}_op${idx}" name="preg${i}" value="${idx}" 
              onclick="respuestas[${i}] = ${idx}" /> ${op}
           </label>`,
            )
            .join("");
          quiz.innerHTML += `<p><strong>${p.pregunta}</strong></p>${opcionesHTML}<hr>`;
        });
      }

      function iniciarTimer() {
        intervaloTimer = setInterval(() => {
          if (examenTerminado) return; // Detener si ya terminó

          const minutos = Math.floor(tiempoRestante / 60);
          const segundos = tiempoRestante % 60;
          const formato = `${minutos}:${segundos.toString().padStart(2, "0")}`;
          document.getElementById("timer").innerText = formato;

          if (tiempoRestante <= 0) {
            clearInterval(intervaloTimer);
            finalizar();
          }

          tiempoRestante--;
        }, 1000);
      }

      function iniciarExamen() {
        // Mostrar hora de inicio
        const ahora = new Date();
        const horaFormato = ahora.toLocaleTimeString("es-ES");
        document.getElementById("horaInicio").innerText = horaFormato;

        // Seleccionar 5 preguntas aleatorias con opciones mezcladas
        seleccionadas = seleccionarPreguntasAleatorias();
        mostrarPreguntas();

        // Iniciar timer
        iniciarTimer();
      }

      function finalizar() {
        if (examenTerminado) return;
        examenTerminado = true;

        // Detener el timer
        clearInterval(intervaloTimer);

        // Mostrar hora de finalización
        const ahoraFin = new Date();
        const horaFinFormato = ahoraFin.toLocaleTimeString("es-ES");
        document.getElementById("horaFinalizacion").innerText = horaFinFormato;
        document.getElementById("horaFinalizacionDiv").style.display = "block";

        // Deshabilitar todos los radios
        const radios = document.querySelectorAll("input[type='radio']");
        radios.forEach((radio) => (radio.disabled = true));

        // Ocultar el botón Finalizar
        document.querySelector("button").style.display = "none";

        let correctas = 0;

        seleccionadas.forEach((p, i) => {
          const respuestaCorrectaIdx = p.respuesta_correcta;

          // Colorear la respuesta correcta de verde
          const labelCorrect = document.getElementById(
            `label_preg${i}_op${respuestaCorrectaIdx}`,
          );
          if (labelCorrect) {
            labelCorrect.style.backgroundColor = "#90EE90";
            labelCorrect.style.fontWeight = "bold";
          }

          // Verificar respuesta del usuario
          const respuestaUsuario = respuestas[i];

          if (respuestaUsuario !== undefined) {
            if (respuestaUsuario !== respuestaCorrectaIdx) {
              // Respuesta incorrecta: colorear la opción seleccionada de rojo
              const labelIncorrect = document.getElementById(
                `label_preg${i}_op${respuestaUsuario}`,
              );
              if (labelIncorrect) {
                labelIncorrect.style.backgroundColor = "#FFB6C6";
                labelIncorrect.style.fontWeight = "bold";
                labelIncorrect.innerHTML +=
                  " <span style='color: red; font-weight: bold;'> ← Incorrecto ❌</span>";
              }
              // Agregar indicador en la respuesta correcta
              if (labelCorrect) {
                labelCorrect.innerHTML +=
                  " <span style='color: #485699; font-weight: bold;'> ← Respuesta correcta</span>";
              }
            } else {
              // Respuesta correcta
              if (labelCorrect) {
                labelCorrect.innerHTML +=
                  " <span style='color: green; font-weight: bold;'> ← Correcto ✅</span>";
              }
              correctas++;
            }
          } else {
            // No respondió la pregunta, solo mostrar indicador de respuesta correcta
            if (labelCorrect) {
              labelCorrect.innerHTML +=
                " <span style='color: red; font-weight: bold;'> ← Respuesta correcta (pregunta no respondida)</span>";
            }
          }
        });

        const porcentaje = Math.round((correctas / seleccionadas.length) * 100);
        const mensaje =
          // Cantidad minima para aprobar
          (correctas >= 6 ? "✅ ¡Aprobado!" : "❌ Reprobado") +
          ` - ${porcentaje}% (${correctas}/${seleccionadas.length} correctas)`;
        document.getElementById("resultado").innerText = mensaje;
      }

      // Iniciar examen cuando la página carga
      iniciarExamen();
    </script>
